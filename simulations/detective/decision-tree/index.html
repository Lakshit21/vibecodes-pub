<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tree Grower</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Special+Elite&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b0908;
  --sur:#161311;
  --bor:#272220;
  --bor2:#342f29;
  --txt:#d0c4b2;
  --dim:#5c5248;
  --dim2:#3a332c;
  --acc:#c8a46e;
  --grn:#3d6b4d;
  --red:#6b3d3d;
  --fui:'Courier Prime','Courier New',monospace;
  --fnd:'Special Elite',cursive;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--fui);color:var(--txt);background:var(--bg)}

/* ── CANVAS ── */
#wrap{
  position:fixed;inset:0;overflow:hidden;cursor:default;
  background-color:var(--bg);
  background-image:radial-gradient(circle,#1e1b18 1px,transparent 1px);
  background-size:26px 26px;
}
#board{position:absolute;transform-origin:0 0;width:1px;height:1px}

/* SVG inside board — large virtual canvas, board-space coordinates + 10000 offset */
#svgl{
  position:absolute;left:-10000px;top:-10000px;
  width:20000px;height:20000px;
  pointer-events:none;overflow:visible;
}

/* ── TOOLBAR ── */
#tb{
  position:fixed;left:14px;top:50%;transform:translateY(-50%);
  z-index:200;display:flex;flex-direction:column;gap:2px;
  background:var(--sur);border:1px solid var(--bor);border-radius:4px;padding:6px 5px;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
}
.tsep{height:1px;background:var(--bor);margin:4px 2px}
.tbtn{
  width:33px;height:33px;display:flex;align-items:center;justify-content:center;
  border:1px solid transparent;border-radius:3px;background:none;
  color:var(--dim);cursor:pointer;font:13px/1 var(--fui);
  position:relative;transition:all .12s;
}
.tbtn:hover{background:var(--bor);color:var(--txt)}
.tbtn.act{background:var(--bor);color:var(--acc);border-color:var(--acc)}
.tt{
  position:absolute;left:41px;top:50%;transform:translateY(-50%);
  background:var(--sur);border:1px solid var(--bor2);
  color:var(--txt);font-size:11px;padding:3px 9px;
  border-radius:2px;white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .12s;z-index:400;letter-spacing:.04em;
}
.tbtn:hover .tt{opacity:1}

/* ── NODES ── */
.node{
  position:absolute;width:210px;
  border:1px solid var(--bor2);border-radius:2px;
  background:var(--sur);cursor:default;user-select:none;
  transition:box-shadow .15s,border-color .15s;z-index:10;
}
.node:hover{box-shadow:0 3px 18px rgba(0,0,0,.55)}
.node.sel{border-color:var(--acc)!important;box-shadow:0 0 0 1px var(--acc),0 4px 20px rgba(0,0,0,.6);z-index:50}
.node.hidden{display:none!important}
.node.stat-accepted{border-color:var(--grn)!important;background:#0e1511}
.node.stat-rejected{border-color:var(--red)!important;background:#150e0e;opacity:.58}
.stat-rejected .ntxt{text-decoration:line-through;color:var(--dim)}

/* Node header (drag handle) */
.nh{
  display:flex;align-items:center;gap:5px;
  padding:6px 8px;border-bottom:1px solid var(--bor);
  cursor:grab;
}
.nh:active{cursor:grabbing}
.nbadge{font-size:9px;letter-spacing:.1em;text-transform:uppercase;flex:1}
.nbtns{display:flex;gap:2px}
.nbtn{
  width:17px;height:17px;display:flex;align-items:center;justify-content:center;
  border:none;background:none;color:var(--dim);cursor:pointer;
  font:11px/1 var(--fui);border-radius:2px;transition:all .1s;
}
.nbtn:hover{background:var(--bor);color:var(--txt)}
.nbtn.coll{color:var(--acc)}

/* Node body */
.nb{padding:10px 9px 6px}
.ntxt{
  font:14px/1.5 var(--fnd);color:var(--txt);
  min-height:22px;outline:none;word-break:break-word;cursor:text;
}
.ntxt:empty::before{content:attr(data-ph);color:var(--dim2);font-style:italic;font-size:13px}
.nsub{
  font:11px/1.45 var(--fui);font-style:italic;color:var(--dim);
  min-height:14px;outline:none;margin-top:7px;word-break:break-word;cursor:text;
}
.nsub:empty::before{content:attr(data-ph);color:var(--dim2)}

/* Node footer */
.nf{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 8px 7px;border-top:1px solid var(--bor);
}
.sbtn{
  font:10px/1 var(--fui);letter-spacing:.04em;
  padding:3px 8px;border:1px solid var(--bor2);border-radius:2px;
  background:none;color:var(--dim);cursor:pointer;transition:all .12s;
}
.sbtn:hover{border-color:var(--dim)}
.stat-accepted .sbtn{color:#5a9;border-color:var(--grn)}
.stat-rejected .sbtn{color:#a55;border-color:var(--red)}
.cdot{
  width:10px;height:10px;border-radius:50%;
  border:1px solid var(--dim);background:var(--bg);
  cursor:crosshair;transition:all .12s;flex-shrink:0;
}
.cdot:hover,.cdot.active{border-color:var(--acc);background:var(--acc)}
.cinfo{
  font-size:10px;color:var(--dim);text-align:center;
  padding:4px 8px;border-top:1px dashed var(--bor);letter-spacing:.04em;
}

/* ── CONTEXT MENU ── */
#ctx{
  position:fixed;background:var(--sur);border:1px solid var(--bor2);
  border-radius:3px;padding:5px 0;z-index:600;min-width:178px;
  display:none;box-shadow:0 10px 28px rgba(0,0,0,.72);
}
.ci{
  padding:7px 14px;font:12px var(--fui);cursor:pointer;
  color:var(--txt);display:flex;align-items:center;gap:10px;
  transition:background .1s;letter-spacing:.02em;
}
.ci:hover{background:var(--bor)}
.ci.danger{color:#b05050}
.csep{height:1px;background:var(--bor);margin:4px 0}

/* ── EDGE PANEL ── */
#ep{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  background:var(--sur);border:1px solid var(--bor2);border-radius:3px;
  padding:7px 14px;display:none;gap:8px;align-items:center;
  z-index:100;font:12px var(--fui);color:var(--dim);
  box-shadow:0 4px 16px rgba(0,0,0,.5);
}
.epbtn{
  font:11px var(--fui);padding:3px 9px;
  border:1px solid var(--bor2);border-radius:2px;
  background:none;color:var(--txt);cursor:pointer;transition:all .1s;
}
.epbtn:hover{border-color:var(--dim)}
.epbtn.d{color:#b05050;border-color:var(--red)}
#elbl{
  min-width:60px;max-width:120px;padding:2px 7px;
  border:1px solid var(--bor);border-radius:2px;
  font:11px var(--fui);color:var(--txt);outline:none;background:var(--bg);
}
#elbl:empty::before{content:'label...';color:var(--dim)}

/* ── MODE / ZOOM BARS ── */
#mbar{
  position:fixed;top:14px;left:50%;transform:translateX(-50%);
  font:11px var(--fui);color:var(--acc);z-index:100;opacity:0;
  transition:opacity .25s;background:var(--sur);
  padding:4px 16px;border:1px solid var(--bor);border-radius:2px;
  letter-spacing:.06em;pointer-events:none;
}
#zlbl{
  position:fixed;bottom:16px;right:16px;
  font:11px var(--fui);color:var(--dim);z-index:100;letter-spacing:.05em;
}

/* SVG edge visuals */
.epath{fill:none;stroke:#3e3830;stroke-width:1.5}
.epath.es{stroke:var(--acc)}
.epath.dash{stroke-dasharray:6,4}

#cprev{display:none}
#finput{display:none}
</style>
</head>
<body>

<div id="tb">
  <button class="tbtn act" id="tb-select" onclick="setMode('select')">↖<span class="tt">select  [v]</span></button>
  <button class="tbtn" id="tb-pan"    onclick="setMode('pan')">✥<span class="tt">pan  [h / space]</span></button>
  <button class="tbtn" id="tb-connect" onclick="setMode('connect')">⟶<span class="tt">connect  [c]</span></button>
  <div class="tsep"></div>
  <button class="tbtn" onclick="addNode('question')">?<span class="tt">question node</span></button>
  <button class="tbtn" onclick="addNode('option')">◇<span class="tt">option node</span></button>
  <button class="tbtn" onclick="addNode('note')">≡<span class="tt">note</span></button>
  <button class="tbtn" onclick="addNode('default')">□<span class="tt">node</span></button>
  <div class="tsep"></div>
  <button class="tbtn" onclick="delSelected()">✕<span class="tt">delete  [del]</span></button>
  <div class="tsep"></div>
  <button class="tbtn" onclick="saveG()">↓<span class="tt">save  [⌘s]</span></button>
  <button class="tbtn" onclick="document.getElementById('finput').click()">↑<span class="tt">load</span></button>
  <div class="tsep"></div>
  <button class="tbtn" onclick="fitView()">⊡<span class="tt">fit view</span></button>
  <button class="tbtn" onclick="clearAll()">∅<span class="tt">clear all</span></button>
</div>

<div id="wrap">
  <div id="board">
    <svg id="svgl" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
          <path d="M0,1.2 L5,3.5 L0,5.8" fill="none" stroke="#3e3830" stroke-width="1.3"/>
        </marker>
        <marker id="arrs" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
          <path d="M0,1.2 L5,3.5 L0,5.8" fill="none" stroke="#c8a46e" stroke-width="1.3"/>
        </marker>
      </defs>
      <line id="cprev" stroke="#c8a46e" stroke-width="1" stroke-dasharray="4,3"/>
    </svg>
  </div>
</div>

<div id="ctx">
  <div class="ci" onclick="ctxAdd('question')"><span style="color:#c8a46e">?</span> question</div>
  <div class="ci" onclick="ctxAdd('option')"><span style="color:#6e9fc8">◇</span> option</div>
  <div class="ci" onclick="ctxAdd('note')"><span style="color:#7ac87e">≡</span> note</div>
  <div class="ci" onclick="ctxAdd('default')"><span style="color:#b87ec8">□</span> node</div>
  <div class="csep"></div>
  <div class="ci" id="ctx-edir" onclick="toggleEDir()" style="display:none">⇌ toggle direction</div>
  <div class="ci" id="ctx-edash" onclick="toggleEDash()" style="display:none">⤍ toggle dashed</div>
  <div class="csep" id="ctx-sep2" style="display:none"></div>
  <div class="ci danger" id="ctx-del" onclick="delSelected()" style="display:none">✕ delete</div>
</div>

<div id="ep">
  <span>edge</span>
  <button class="epbtn" onclick="toggleEDir()">⇌ dir</button>
  <button class="epbtn" onclick="toggleEDash()">— dash</button>
  <span id="elbl" contenteditable="true" oninput="updateELabel(this)"></span>
  <button class="epbtn d" onclick="delSelEdge()">✕</button>
</div>

<div id="mbar"></div>
<div id="zlbl">100%</div>
<input type="file" id="finput" accept=".json" onchange="loadG(event)">

<script>
// ─── CONFIG ────────────────────────────────────────────
const OFF = 10000; // SVG coordinate offset (board coords + OFF = SVG coords)

const TM = { // type metadata
  question:{ label:'question', col:'#c8a46e' },
  option:  { label:'option',   col:'#6e9fc8' },
  note:    { label:'note',     col:'#7ac87e' },
  default: { label:'node',     col:'#b87ec8' },
};

// ─── STATE ─────────────────────────────────────────────
const S = {
  nodes:{}, edges:{},
  sel:null, selE:null,
  mode:'select',
  pan:{x:0,y:0}, zoom:1,
  conn:null,
  drag:null, panning:false,
  ps:{x:0,y:0}, po:{x:0,y:0},
  ctxBp:{x:0,y:0},
  _nid:0, _eid:0,
  _hid:new Set(),
  _didDrag:false,
};

// ─── DOM ───────────────────────────────────────────────
const board  = document.getElementById('board');
const svgl   = document.getElementById('svgl');
const wrap   = document.getElementById('wrap');
const ctx    = document.getElementById('ctx');
const ep     = document.getElementById('ep');
const mbar   = document.getElementById('mbar');
const zlbl   = document.getElementById('zlbl');
const cprev  = document.getElementById('cprev');

// ─── TRANSFORM ─────────────────────────────────────────
function applyT(){
  board.style.transform=`translate(${S.pan.x}px,${S.pan.y}px) scale(${S.zoom})`;
  zlbl.textContent=Math.round(S.zoom*100)+'%';
}
function s2b(sx,sy){return{x:(sx-S.pan.x)/S.zoom,y:(sy-S.pan.y)/S.zoom}}

// ─── NODE CREATE ───────────────────────────────────────
function mkNid(){return'n'+(++S._nid)}
function mkEid(){return'e'+(++S._eid)}

function createNode(type,x,y,text='',sub=''){
  const id=mkNid();
  const rr={question:1.4,option:.7,note:1.8,default:.4}[type]||1;
  S.nodes[id]={id,type,x,y,text,sub,status:'default',collapsed:false,rot:(Math.random()-.5)*rr*2};
  mountNode(id);
  return id;
}

function mountNode(id){
  document.getElementById('nd-'+id)?.remove();
  const n=S.nodes[id], m=TM[n.type]||TM.default;

  const el=document.createElement('div');
  el.id='nd-'+id;
  el.className=`node n-${n.type} stat-${n.status}${S._hid.has(id)?' hidden':''}`;
  el.style.cssText=`left:${n.x}px;top:${n.y}px;transform:rotate(${n.rot}deg)`;

  el.innerHTML=`
    <div class="nh" data-nid="${id}">
      <span class="nbadge" style="color:${m.col}">${m.label}</span>
      <div class="nbtns">
        <button class="nbtn ${n.collapsed?'coll':''}" data-action="collapse" title="collapse">${n.collapsed?'▶':'▼'}</button>
        <button class="nbtn" data-action="delete" title="delete">×</button>
      </div>
    </div>
    <div class="nb">
      <div class="ntxt" contenteditable="true" data-ph="write here..." spellcheck="false">${esc(n.text)}</div>
      <div class="nsub" contenteditable="true" data-ph="notes / reason to reject..." spellcheck="false">${esc(n.sub)}</div>
    </div>
    <div class="nf">
      <button class="sbtn" data-action="status">${sLbl(n.status)}</button>
      <div class="cdot" title="→ connect"></div>
    </div>
    ${collInfo(id,n)}
  `;

  board.appendChild(el);
  wireNode(id,el);
}

function collInfo(id,n){
  if(!n.collapsed) return '';
  const c=desc(id).size;
  return c>0?`<div class="cinfo">▸ ${c} collapsed</div>`:'';
}

function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}
function sLbl(s){return s==='accepted'?'✓ accept':s==='rejected'?'✕ reject':'· pending'}

// ─── WIRE NODE EVENTS ──────────────────────────────────
function wireNode(id,el){
  const nh=el.querySelector('.nh');
  const cdot=el.querySelector('.cdot');
  const txts=el.querySelectorAll('[contenteditable]');

  // Prevent click bubbling to canvas
  el.addEventListener('click',e=>e.stopPropagation());
  el.addEventListener('contextmenu',e=>e.stopPropagation());

  // Header drag
  nh.addEventListener('mousedown',e=>{
    if(e.target.closest('.nbtn')) return;
    e.preventDefault();e.stopPropagation();
    selectNode(id);
    const n=S.nodes[id];
    S.drag={nid:id,sx:e.clientX,sy:e.clientY,nx:n.x,ny:n.y};
    S._didDrag=false;
  });

  // Node-level mousedown for connect mode
  el.addEventListener('mousedown',e=>{
    if(e.button!==0) return;
    if(e.target.closest('.nbtn')||e.target.closest('.cdot')||e.target.closest('[contenteditable]')) return;
    e.stopPropagation();
    if(S.mode==='connect'){handleConn(id);return}
    selectNode(id);
  });

  // Button actions
  el.querySelector('[data-action="collapse"]').addEventListener('click',e=>{e.stopPropagation();toggleCollapse(id)});
  el.querySelector('[data-action="delete"]').addEventListener('click',e=>{e.stopPropagation();deleteNode(id)});
  el.querySelector('[data-action="status"]').addEventListener('click',e=>{e.stopPropagation();cycleStatus(id)});

  // Connect dot
  cdot.addEventListener('mousedown',e=>{
    e.preventDefault();e.stopPropagation();
    if(!S.conn){startConn(id)}
    else if(S.conn!==id){finishConn(id)}
    else{cancelConn()}
  });

  // Editable fields
  txts.forEach(t=>{
    const field=t.classList.contains('ntxt')?'text':'sub';
    t.addEventListener('mousedown',e=>e.stopPropagation());
    t.addEventListener('click',e=>e.stopPropagation());
    t.addEventListener('keydown',e=>{e.stopPropagation();if(e.key==='Escape')t.blur()});
    t.addEventListener('input',()=>{S.nodes[id][field]=t.textContent});
    t.addEventListener('focus',()=>selectNode(id));
  });
}

// ─── CONNECT ───────────────────────────────────────────
function handleConn(id){
  if(!S.conn){startConn(id);return}
  if(S.conn===id){cancelConn();return}
  finishConn(id);
}

function startConn(fromId){
  S.conn=fromId;
  // Highlight dot
  const dot=document.querySelector(`#nd-${fromId} .cdot`);
  if(dot) dot.classList.add('active');
  showBar('click target node — esc to cancel');
  const c=nCenter(fromId);
  cprev.setAttribute('x1',c.x+OFF);cprev.setAttribute('y1',c.y+OFF);
  cprev.setAttribute('x2',c.x+OFF);cprev.setAttribute('y2',c.y+OFF);
  cprev.style.display='';
}

function finishConn(toId){
  if(S.conn&&S.conn!==toId) createEdge(S.conn,toId);
  const dot=S.conn?document.querySelector(`#nd-${S.conn} .cdot`):null;
  if(dot) dot.classList.remove('active');
  S.conn=null;
  cprev.style.display='none';
  hideBar();
}

function cancelConn(){
  if(S.conn){
    const dot=document.querySelector(`#nd-${S.conn} .cdot`);
    if(dot) dot.classList.remove('active');
  }
  S.conn=null;
  cprev.style.display='none';
  hideBar();
}

// ─── EDGES ─────────────────────────────────────────────
function createEdge(from,to,type='directed',style='solid',label=''){
  for(const e of Object.values(S.edges))
    if(e.from===from&&e.to===to) return null;
  const id=mkEid();
  S.edges[id]={id,from,to,type,style,label};
  renderEdges();
  return id;
}

function nCenter(id){
  const n=S.nodes[id],el=document.getElementById('nd-'+id);
  if(!n) return{x:0,y:0};
  return{x:n.x+(el?el.offsetWidth:210)/2,y:n.y+(el?el.offsetHeight:110)/2};
}

function nEdgePt(fromId,toId){
  const n=S.nodes[fromId],el=document.getElementById('nd-'+fromId);
  if(!n||!el) return{x:0,y:0};
  const w=el.offsetWidth,h=el.offsetHeight;
  const cx=n.x+w/2,cy=n.y+h/2;
  const t=nCenter(toId);
  const dx=t.x-cx,dy=t.y-cy;
  if(Math.abs(dx)<1&&Math.abs(dy)<1) return{x:cx,y:cy};
  let ex,ey;
  if(Math.abs(dx)*h>Math.abs(dy)*w){
    ex=dx>0?n.x+w:n.x;
    ey=cy+(dy/dx)*(ex-cx);
  }else{
    ey=dy>0?n.y+h:n.y;
    ex=cx+(dy!==0?(dx/dy)*(ey-cy):0);
  }
  return{x:ex,y:ey};
}

function renderEdges(){
  svgl.querySelectorAll('.eg').forEach(e=>e.remove());

  for(const edge of Object.values(S.edges)){
    if(S._hid.has(edge.from)||S._hid.has(edge.to)) continue;
    const fr=nEdgePt(edge.from,edge.to);
    const to=nEdgePt(edge.to,edge.from);
    const fx=fr.x+OFF,fy=fr.y+OFF,tx=to.x+OFF,ty=to.y+OFF;
    const mx=(fx+tx)/2,my=(fy+ty)/2;
    const dx=tx-fx,dy=ty-fy,len=Math.hypot(dx,dy)||1;
    const bend=Math.min(len*.2,45);
    const cpx=mx-dy/len*bend,cpy=my+dx/len*bend;
    const isSel=edge.id===S.selE;
    const col=isSel?'#c8a46e':'#3e3830';

    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.classList.add('eg');

    const d=`M${fx},${fy} Q${cpx},${cpy} ${tx},${ty}`;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',d);
    path.setAttribute('fill','none');
    path.setAttribute('stroke',col);
    path.setAttribute('stroke-width','1.5');
    if(edge.style==='dashed') path.setAttribute('stroke-dasharray','6,4');
    if(edge.type==='directed') path.setAttribute('marker-end',isSel?'url(#arrs)':'url(#arr)');

    if(edge.label){
      const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x',cpx);txt.setAttribute('y',cpy-7);
      txt.setAttribute('text-anchor','middle');
      txt.setAttribute('fill','#5c5248');
      txt.setAttribute('font-size','11');
      txt.setAttribute('font-family',"'Courier Prime',monospace");
      txt.textContent=edge.label;
      g.appendChild(txt);
    }
    g.appendChild(path);
    svgl.appendChild(g);
  }

  // Update preview line if connecting
  if(S.conn){
    const c=nCenter(S.conn);
    cprev.setAttribute('x1',c.x+OFF);cprev.setAttribute('y1',c.y+OFF);
  }
}

function hitEdge(bx,by){
  const thr=9/S.zoom;
  for(const edge of Object.values(S.edges)){
    if(S._hid.has(edge.from)||S._hid.has(edge.to)) continue;
    const fr=nEdgePt(edge.from,edge.to),to=nEdgePt(edge.to,edge.from);
    const mx=(fr.x+to.x)/2,my=(fr.y+to.y)/2;
    const dx=to.x-fr.x,dy=to.y-fr.y,len=Math.hypot(dx,dy)||1;
    const bend=Math.min(len*.2,45);
    const cpx=mx-dy/len*bend,cpy=my+dx/len*bend;
    for(let t=0;t<=1;t+=.04){
      const qx=(1-t)**2*fr.x+2*(1-t)*t*cpx+t**2*to.x;
      const qy=(1-t)**2*fr.y+2*(1-t)*t*cpy+t**2*to.y;
      if(Math.hypot(qx-bx,qy-by)<thr) return edge.id;
    }
  }
  return null;
}

// ─── COLLAPSE ──────────────────────────────────────────
function desc(id){
  const set=new Set();
  function dfs(nid){
    for(const e of Object.values(S.edges))
      if(e.type==='directed'&&e.from===nid&&!set.has(e.to)){set.add(e.to);dfs(e.to)}
  }
  dfs(id); return set;
}

function updateHidden(){
  S._hid=new Set();
  for(const n of Object.values(S.nodes))
    if(n.collapsed) for(const d of desc(n.id)) S._hid.add(d);
  for(const [id] of Object.entries(S.nodes)){
    const el=document.getElementById('nd-'+id);
    if(el) el.classList.toggle('hidden',S._hid.has(id));
  }
  renderEdges();
}

function toggleCollapse(id){
  const n=S.nodes[id]; n.collapsed=!n.collapsed;
  const el=document.getElementById('nd-'+id);
  if(el){
    const cb=el.querySelector('[data-action="collapse"]');
    if(cb){cb.textContent=n.collapsed?'▶':'▼';cb.classList.toggle('coll',n.collapsed)}
    // Update cinfo
    let ci=el.querySelector('.cinfo');
    const chCount=desc(id).size;
    if(n.collapsed&&chCount>0){
      if(!ci){ci=document.createElement('div');ci.className='cinfo';el.appendChild(ci)}
      ci.textContent=`▸ ${chCount} collapsed`;
    } else ci?.remove();
  }
  updateHidden();
}

// ─── STATUS ────────────────────────────────────────────
function cycleStatus(id){
  const n=S.nodes[id],cy=['default','accepted','rejected'];
  n.status=cy[(cy.indexOf(n.status)+1)%3];
  const el=document.getElementById('nd-'+id);
  if(!el) return;
  el.className=el.className.replace(/\bstat-\w+/,'stat-'+n.status);
  const sb=el.querySelector('.sbtn');
  if(sb) sb.textContent=sLbl(n.status);
}

// ─── SELECTION ─────────────────────────────────────────
function selectNode(id){
  clearSel();
  S.sel=id;
  document.getElementById('nd-'+id)?.classList.add('sel');
  hideEP();
}

function selectEdge(id){
  clearSel();
  S.selE=id;
  renderEdges();
  showEP(id);
}

function clearSel(){
  document.querySelectorAll('.node.sel').forEach(e=>e.classList.remove('sel'));
  S.sel=null;S.selE=null;hideEP();
}

function showEP(id){
  const e=S.edges[id];if(!e) return;
  document.getElementById('elbl').textContent=e.label||'';
  ep.style.display='flex';
}
function hideEP(){ep.style.display='none'}

// ─── EDGE PANEL CONTROLS ───────────────────────────────
function toggleEDir(){
  if(!S.selE) return;
  const e=S.edges[S.selE];
  e.type=e.type==='directed'?'undirected':'directed';
  renderEdges();
}
function toggleEDash(){
  if(!S.selE) return;
  const e=S.edges[S.selE];
  e.style=e.style==='dashed'?'solid':'dashed';
  renderEdges();
}
function updateELabel(el){
  if(!S.selE) return;
  S.edges[S.selE].label=el.textContent;
  renderEdges();
}
function delSelEdge(){
  if(!S.selE) return;
  delete S.edges[S.selE];
  S.selE=null;hideEP();renderEdges();
}

// ─── NODE ACTIONS ──────────────────────────────────────
function deleteNode(id){
  for(const [eid,e] of Object.entries(S.edges))
    if(e.from===id||e.to===id) delete S.edges[eid];
  delete S.nodes[id];
  document.getElementById('nd-'+id)?.remove();
  if(S.sel===id) S.sel=null;
  updateHidden();
}

function delSelected(){
  if(S.sel) deleteNode(S.sel);
  else if(S.selE) delSelEdge();
}

function addNode(type){
  const cx=(window.innerWidth/2-S.pan.x)/S.zoom;
  const cy=(window.innerHeight/2-S.pan.y)/S.zoom;
  const id=createNode(type,cx-105+(Math.random()-.5)*60,cy-55+(Math.random()-.5)*40);
  selectNode(id); focusTxt(id);
}

function focusTxt(id){
  setTimeout(()=>{
    const el=document.querySelector(`#nd-${id} .ntxt`);
    if(el){el.focus();const r=document.createRange();r.selectNodeContents(el);r.collapse(false);const s=window.getSelection();s.removeAllRanges();s.addRange(r)}
  },45);
}

// ─── MODE ──────────────────────────────────────────────
function setMode(m){
  S.mode=m;
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('act'));
  document.getElementById('tb-'+m)?.classList.add('act');
  if(m!=='connect') cancelConn();
  wrap.style.cursor=m==='pan'?'grab':'default';
}

function showBar(t){mbar.textContent='— '+t+' —';mbar.style.opacity='1'}
function hideBar(){mbar.style.opacity='0'}

// ─── CONTEXT MENU ──────────────────────────────────────
function showCtx(sx,sy){
  S.ctxBp=s2b(sx,sy);
  const hasE=!!S.selE,has=!!S.sel||!!S.selE;
  document.getElementById('ctx-edir').style.display=hasE?'':'none';
  document.getElementById('ctx-edash').style.display=hasE?'':'none';
  document.getElementById('ctx-sep2').style.display=has?'':'none';
  document.getElementById('ctx-del').style.display=has?'':'none';
  ctx.style.cssText=`display:block;left:${Math.min(sx,window.innerWidth-190)}px;top:${Math.min(sy,window.innerHeight-200)}px`;
}
function hideCtx(){ctx.style.display='none'}
function ctxAdd(type){
  hideCtx();
  const id=createNode(type,S.ctxBp.x-105,S.ctxBp.y-55);
  selectNode(id);focusTxt(id);
}

// ─── SAVE / LOAD ───────────────────────────────────────
function saveG(){
  const data=JSON.stringify({v:1,nodes:S.nodes,edges:S.edges,pan:S.pan,zoom:S.zoom,_nid:S._nid,_eid:S._eid},null,2);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([data],{type:'application/json'}));
  a.download='treegrower-'+Date.now()+'.json';
  a.click();
}

function loadG(ev){
  const file=ev.target.files[0];if(!file) return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      clearAll(false);
      S.nodes=d.nodes||{};S.edges=d.edges||{};
      S.pan=d.pan||{x:0,y:0};S.zoom=d.zoom||1;
      S._nid=d._nid||0;S._eid=d._eid||0;
      applyT();
      for(const id of Object.keys(S.nodes)) mountNode(id);
      setTimeout(()=>{updateHidden();renderEdges()},80);
    }catch{alert('Cannot parse file.')}
  };
  r.readAsText(file);
  ev.target.value='';
}

function clearAll(ask=true){
  if(ask&&!confirm('Clear everything?')) return;
  for(const id of Object.keys(S.nodes)) document.getElementById('nd-'+id)?.remove();
  S.nodes={};S.edges={};S.sel=null;S.selE=null;S._hid=new Set();
  hideEP();renderEdges();
}

function fitView(){
  const ids=Object.keys(S.nodes);if(!ids.length) return;
  let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
  for(const id of ids){
    const n=S.nodes[id],el=document.getElementById('nd-'+id);
    const w=el?el.offsetWidth:210,h=el?el.offsetHeight:110;
    x0=Math.min(x0,n.x);y0=Math.min(y0,n.y);
    x1=Math.max(x1,n.x+w);y1=Math.max(y1,n.y+h);
  }
  const pad=90;
  S.zoom=Math.min(window.innerWidth/(x1-x0+pad*2),window.innerHeight/(y1-y0+pad*2),1.8);
  S.pan.x=(window.innerWidth-(x0+x1)*S.zoom)/2;
  S.pan.y=(window.innerHeight-(y0+y1)*S.zoom)/2;
  applyT();renderEdges();
}

// ─── CANVAS EVENTS ─────────────────────────────────────
let spaceDown=false;

wrap.addEventListener('mousedown',e=>{
  hideCtx();
  const isPan=S.mode==='pan'||e.button===1||(e.button===0&&spaceDown);
  if(isPan&&e.button!==2){
    e.preventDefault();
    S.panning=true;
    S.ps={x:e.clientX,y:e.clientY};
    S.po={x:S.pan.x,y:S.pan.y};
    wrap.style.cursor='grabbing';
  }
});

wrap.addEventListener('click',e=>{
  if(S._didDrag){S._didDrag=false;return}
  // Check if click is on empty canvas (nodes stop propagation)
  if(e.target!==wrap&&e.target!==board&&!e.target.closest('#svgl')) return;
  const bp=s2b(e.clientX,e.clientY);
  const eHit=hitEdge(bp.x,bp.y);
  if(eHit){selectEdge(eHit)}
  else{
    if(S.mode==='connect'&&S.conn) cancelConn();
    else clearSel();
  }
});

wrap.addEventListener('dblclick',e=>{
  if(e.target!==wrap&&e.target!==board) return;
  const bp=s2b(e.clientX,e.clientY);
  const id=createNode('default',bp.x-105,bp.y-55);
  selectNode(id);focusTxt(id);
});

wrap.addEventListener('contextmenu',e=>{
  e.preventDefault();showCtx(e.clientX,e.clientY);
});

document.addEventListener('click',e=>{
  if(!e.target.closest('#ctx')) hideCtx();
});

document.addEventListener('mousemove',e=>{
  if(S.panning){
    S.pan.x=S.po.x+(e.clientX-S.ps.x);
    S.pan.y=S.po.y+(e.clientY-S.ps.y);
    applyT();renderEdges();return;
  }
  if(S.drag){
    S._didDrag=true;
    const d=S.drag,dx=(e.clientX-d.sx)/S.zoom,dy=(e.clientY-d.sy)/S.zoom;
    const n=S.nodes[d.nid];
    n.x=d.nx+dx;n.y=d.ny+dy;
    const el=document.getElementById('nd-'+d.nid);
    if(el){el.style.left=n.x+'px';el.style.top=n.y+'px'}
    renderEdges();return;
  }
  if(S.conn){
    const bp=s2b(e.clientX,e.clientY);
    cprev.setAttribute('x2',bp.x+OFF);
    cprev.setAttribute('y2',bp.y+OFF);
  }
});

document.addEventListener('mouseup',e=>{
  if(S.panning){
    S.panning=false;
    wrap.style.cursor=S.mode==='pan'?'grab':'default';
  }
  if(S.drag) S.drag=null;
});

wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.1:.9;
  const pz=S.zoom;
  S.zoom=Math.max(.07,Math.min(6,S.zoom*f));
  S.pan.x=e.clientX-(e.clientX-S.pan.x)*S.zoom/pz;
  S.pan.y=e.clientY-(e.clientY-S.pan.y)*S.zoom/pz;
  applyT();renderEdges();
},{passive:false});

document.addEventListener('keydown',e=>{
  if(e.target.closest('[contenteditable]')) return;
  if(e.key===' '){e.preventDefault();spaceDown=true;wrap.style.cursor='grab'}
  if(e.key==='Delete'||e.key==='Backspace') delSelected();
  if(e.key==='Escape'){clearSel();cancelConn()}
  if(!e.metaKey&&!e.ctrlKey){
    if(e.key==='v') setMode('select');
    if(e.key==='h') setMode('pan');
    if(e.key==='c') setMode('connect');
  }
  if((e.metaKey||e.ctrlKey)&&e.key==='s'){e.preventDefault();saveG()}
});

document.addEventListener('keyup',e=>{
  if(e.key===' '){spaceDown=false;wrap.style.cursor=S.mode==='pan'?'grab':'default'}
});

// ─── INIT ──────────────────────────────────────────────
S.pan={x:window.innerWidth/2-105,y:window.innerHeight/2-55};
applyT();

// Seed
setTimeout(()=>{
  createNode('question',0,0,'what do I do right now?','');
},0);
</script>
</body>
